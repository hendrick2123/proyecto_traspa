<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión – Grupo Urbania</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#61a60e;--green-dark:#4d8a0a;--green-light:#e8f5d9;
      --black:#111111;--border:#ddd;--red:#c0392b;
    }
    body{
      font-family:'Montserrat',sans-serif;
      background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
    }
    .auth-wrap{
      width:100%;max-width:420px;padding:20px;
    }
    .auth-brand{text-align:center;margin-bottom:32px}
    .auth-brand .logo-text{
      font-size:22px;font-weight:900;color:#fff;letter-spacing:1px;
    }
    .auth-brand .logo-text span{color:var(--green)}
    .auth-brand .logo-sub{
      font-size:11px;font-weight:600;color:#61a60e;letter-spacing:2px;
      text-transform:uppercase;margin-top:4px;
    }
    .auth-card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:16px;
      padding:36px 32px;
      backdrop-filter:blur(12px);
      box-shadow:0 24px 60px rgba(0,0,0,0.4);
    }
    .auth-card h2{
      font-size:20px;font-weight:800;color:#fff;margin-bottom:6px;
    }
    .auth-card .subtitle{
      font-size:12px;color:#888;margin-bottom:28px;
    }
    .form-group{margin-bottom:18px}
    .form-group label{
      display:block;font-size:11px;font-weight:700;color:#aaa;
      text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;
    }
    .form-group input{
      width:100%;padding:11px 14px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:8px;
      font-family:'Montserrat',sans-serif;font-size:13px;color:#fff;
      outline:none;transition:border .2s,background .2s;
    }
    .form-group input::placeholder{color:#555}
    .form-group input:focus{
      border-color:var(--green);
      background:rgba(97,166,14,0.08);
    }
    .btn-login{
      width:100%;padding:13px;
      background:var(--green);border:none;border-radius:8px;
      font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;
      color:#fff;cursor:pointer;transition:background .2s,transform .1s;
      letter-spacing:.3px;
    }
    .btn-login:hover{background:var(--green-dark);transform:translateY(-1px)}
    .btn-login:active{transform:translateY(0)}
    .auth-footer{
      text-align:center;margin-top:24px;
      font-size:12px;color:#666;
    }
    .auth-footer a{
      color:var(--green);text-decoration:none;font-weight:700;
    }
    .auth-footer a:hover{text-decoration:underline}
    .error-msg{
      background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);
      color:#e74c3c;border-radius:8px;padding:11px 14px;
      font-size:12px;margin-bottom:18px;display:none;
    }
    .input-icon-wrap{position:relative}
    .input-icon-wrap input{padding-right:40px}
    .toggle-pw{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:#666;
      display:flex;align-items:center;
    }
    .toggle-pw:hover{color:#aaa}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .spinner{
      width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;
      animation:spin .7s linear infinite;display:inline-block;margin-right:8px;
    }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-brand">
    <div class="logo-text">GRUPO <span>URBANIA</span></div>
    <div class="logo-sub">Sistema de Traspasos</div>
  </div>

  <div class="auth-card">
    <h2>Bienvenido</h2>
    <p class="subtitle">Ingresa tus credenciales para continuar</p>

    <div class="error-msg" id="login-error"></div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="login-username" placeholder="Nombre de usuario" autocomplete="username">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <div class="input-icon-wrap">
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePw('login-password', this)">
          <svg id="eye-open" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">Iniciar Sesión</button>

    <div class="auth-footer">
      Contacta a tu administrador para obtener una cuenta.
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8000' : '';

function togglePw(id, btn) {
  const input = document.getElementById(id);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.style.color = isText ? '#666' : '#61a60e';
}

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-username').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('btn-login');

  errEl.style.display = 'none';

  if (!username || !password) {
    errEl.textContent = 'Completa usuario y contraseña.';
    errEl.style.display = 'block';
    return;
  }

  btn.innerHTML = '<span class="spinner"></span>Verificando...';
  btn.disabled = true;

  try {
    const res  = await fetch(API_BASE + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      errEl.textContent = data.error || 'Usuario o contraseña incorrectos.';
      errEl.style.display = 'block';
    } else {
      sessionStorage.setItem('gu_user', JSON.stringify(data.user));
      sessionStorage.setItem('gu_token', data.token);
      window.location.href = 'index.html';
    }
  } catch (e) {
    errEl.textContent = 'No se pudo conectar con el servidor.';
    errEl.style.display = 'block';
  }

  btn.innerHTML = 'Iniciar Sesión';
  btn.disabled = false;
}

// Si ya hay sesión, redirigir
if (sessionStorage.getItem('gu_user')) {
  window.location.href = 'index.html';
}
</script>

</body>
</html>
